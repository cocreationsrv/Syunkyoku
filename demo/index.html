<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KotobaLink Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell" id="app-shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="brand">
            <div class="brand-mark">KL</div>
            <div class="brand-copy">
              <div class="brand-title">KotobaLink</div>
              <div class="brand-subtitle" id="brand-subtitle">Demo Prototype</div>
            </div>
          </div>
          <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="切换侧边栏">⟨</button>
        </div>
        <div class="lang-switcher">
          <button class="lang-btn active" data-locale="zh" type="button">中文</button>
          <button class="lang-btn" data-locale="ja" type="button">日本語</button>
        </div>
        <div class="scenario-entry">
          <button class="nav-btn active scenario-btn" id="scenario-nav-btn" data-view="scenario" data-roles="all" data-short="シ">演示シナリオ</button>
        </div>
        <div class="role-switcher">
          <div class="role-title" id="role-switcher-title">后台角色切换</div>
          <div class="role-options">
            <button class="role-btn active" id="role-admin-btn" data-role="admin" data-short="管">管理员</button>
            <button class="role-btn" id="role-operator-btn" data-role="operator" data-short="运">教务/运营</button>
            <button class="role-btn" id="role-teacher-btn" data-role="teacher" data-short="师">教师</button>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-btn" id="mini-nav-btn" data-view="mini-app" data-short="小">小程序体验</button>
          <button class="nav-btn" id="launch-nav-btn" data-view="launch-guide" data-roles="all" data-short="上">上线准备</button>
        </nav>
        <div class="sidebar-note">
          <div class="role-title" id="current-demo-title">当前演示</div>
          <div id="page-title" class="sidebar-page-title">演示シナリオ</div>
          <p id="page-subtitle" class="sidebar-page-subtitle">按闭环、角色和权限整理的演示脚本</p>
        </div>
      </aside>
      <main class="content">
        <button class="floating-sidebar-toggle" id="topbar-sidebar-toggle" type="button" aria-label="切换侧边栏">☰</button>
        <section id="view-root"></section>
      </main>
    </div>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
  </html>
